name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  validate-version:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version=$(node -p "require('./package.json').version")
          tag_name="${{ github.ref_name || '' }}"
          if [ -n "$tag_name" ]; then
            tag_version="${tag_name#v}"
            if [ "$package_version" != "$tag_version" ]; then
              echo "package.json version: $package_version"
              echo "release tag version: $tag_version"
              exit 1
            fi
          fi

  build:
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
        host:
          - x64
        target:
          - x64
        node:
          - 24
        include:
          - os: windows-latest
            node: 24
            host: x86
            target: x86

    name: ${{ matrix.os }} (node=${{ matrix.node }}, host=${{ matrix.host }}, target=${{ matrix.target }})
    steps:
      - uses: actions/checkout@v5

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: ${{ matrix.target }}

      - name: Setup node (node=${{ matrix.node }}, host=${{ matrix.host }})
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          architecture: ${{ matrix.host }}
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Add env vars
        shell: bash
        run: |
          echo "V=1" >> $GITHUB_ENV
          if [ "${{ matrix.target }}" = "x86" ]; then
            echo "TARGET=ia32" >> $GITHUB_ENV
          else
            echo "TARGET=${{ matrix.target }}" >> $GITHUB_ENV
          fi
      - name: Configure build
        run: ./node_modules/.bin/node-pre-gyp configure --target_arch=${{ env.TARGET }}

      - name: Build binaries
        run: ./node_modules/.bin/node-pre-gyp build --target_arch=${{ env.TARGET }}

      - name: Package prebuilt binaries
        run: ./node_modules/.bin/node-pre-gyp package --target_arch=${{ env.TARGET }}

      - name: Upload binaries to commit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-binaries-${{ matrix.target }}
          path: build/stage/*/*
          retention-days: 7

  package:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: prebuilt-binaries
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Unpack prebuilt binaries into package contents
        shell: bash
        run: |
          find prebuilt-binaries -type f -name '*.tar.gz' -print -exec tar -xzf {} \;
          find lib/binding -type f -name '*.node' | grep -q .

      - name: Create npm tarball
        run: npm pack --ignore-scripts

      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: mukea-get-windows-*.tgz

      - name: Publish release assets to GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            prebuilt-binaries/**/*.tar.gz
            mukea-get-windows-*.tgz

      - name: Determine publish tag
        shell: bash
        run: |
          publish_tag=$(node -p "const version = require('./package.json').version; const prerelease = version.split('-', 2)[1]; prerelease ? prerelease.split('.')[0] : 'latest'")
          echo "PUBLISH_TAG=$publish_tag" >> "$GITHUB_ENV"

      - name: Publish to npmjs
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public --tag "$PUBLISH_TAG"
